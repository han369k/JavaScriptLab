<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event</title>
    <style>
        body {
            font-size: 17px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
        }

        header {
            background-color: black;
            color: yellow;
            /* 內距 */
            padding: 20px;
            /* 文字置中 */
            text-align: center;
        }

        .container {
            width: 90%;
            /* 外距 */
            margin: auto;
            padding: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Event 綁定事件</h1>
    </header>
    <div class="container">
        <!-- 第一種綁定方式 -->
        <!-- onclick就是點擊觸發 -->
        <button onclick="console.log('click button')">button1</button>
        <button id="btn2">button2</button>
        <button id="btn3">button3</button>
    </div>
    <script>
        // JavaScript code
        // 第二種綁定方式 只能綁定一個函式
        const btn2 = document.getElementById('btn2');
        console.log(btn2);
        btn2.onclick = function () { // isPass
            console.log('click buton2-1');
        }
        btn2.onclick = function () { // only have this
            console.log('click buton2-2');
        }

        // 第三種綁定方式
        // addEventListner('事件名稱',函數)
        // 可以多事件綁定
        btn3.addEventListener('click', function () {
            console.log('click button3-1');
        })
        btn3.addEventListener('click', function () {
            console.log('click button3-2');
        })

    </script>
</body>

</html>
