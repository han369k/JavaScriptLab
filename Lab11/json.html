<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON</title>
    <style>
        body {
            font-size: 17px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
        }

        header {
            background-color: black;
            color: yellow;
            /* 內距 */
            padding: 20px;
            /* 文字置中 */
            text-align: center;
        }

        .container {
            width: 90%;
            /* 外距 */
            margin: auto;
            padding: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1>JSON</h1>
    </header>
    <div class="container"></div>
    <script>
        // javascript code
        window.onload = function () {
            /*
                JSON
                javascript文件表示法
                屬性名稱要加雙引號 "屬性名稱"
                字串 number boolean 陣列
                JSON.parse()
                    JSON資料轉成javascript物件
                JSON.stringfy()
                    javascript物件轉換JSON資料
            */
            let json1 = `{
                            "name": "Madame Uppercut",
                            "age": 39,
                            "secretIdentity": "Jane Wilson",
                            "powers": [
                            "Million tonne punch",
                            "Damage resistance",
                            "Superhuman reflexes"
                            ]
                            }`;
            let obj1 = JSON.parse(json1);
            console.log(obj1);
            console.log(obj1.name);
            console.log(obj1.age);
            console.log(obj1.powers[1]);

            obj1.name = 'Gary';
            obj1.age = 18;
            obj1.powers[0] = 'javascript';

            let json2 = JSON.stringify(obj1);
            console.log(json2);

            let json3 = `[{
                            "name": "Molecule Man",
                            "age": 29,
                            "secretIdentity": "Dan Jukes",
                            "powers": ["Radiation resistance", "Turning tiny", "Radiation blast"]
                            },
                            {
                            "name": "Madame Uppercut",
                            "age": 39,
                            "secretIdentity": "Jane Wilson",
                            "powers": ["Million tonne punch","Damage resistance",
                            "Superhuman reflexes"]
                            }]`;
            let obj2 = JSON.parse(json3);
            console.log(obj2);
            console.log(obj2[0]);
            console.log(obj2[0].name);
            console.log(obj2[0].powers[1]);


            // 解構賦值
            // 複製
            let arr=['a','b','c'];
            let arrcopy = [...arr];
            console.log(arr);
            console.log(arrcopy);
            console.log(arrcopy === arr); // false

            // 淺層複製
            let arr2 = [{name:'gary',age:18},'a','b','c'];
            let arr2copy = [...arr2];
            console.log(arr2);
            console.log(arr2copy);
            console.log('------------------------------');
            arr2copy[0].name = 'Jerry';
            console.log(arr2);
            console.log(arr2copy);

            // 深層複製
            let arr3 = [{name:'gary',age:18},'a','b','c'];
            let arr3copy = JSON.parse(JSON.stringify(arr3));
            console.log(arr3);
            console.log(arr3copy);
            console.log('------------------------------');
            arr3copy[0].name = 'Jerry';
            console.log(arr3);
            console.log(arr3copy);


        }
    </script>
</body>

</html>
