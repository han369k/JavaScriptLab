<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99乘法表 </title>
    <style>
        body {
            font-size: 17px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
        }

        header {
            background-color: black;
            color: yellow;
            /* 內距 */
            padding: 20px;
            /* 文字置中 */
            text-align: center;
        }

        .container {
            width: 90%;
            /* 外距 */
            margin: auto;
            padding: 10px;
        }

        table {
            width: 800px;
            height: 400px;
            border: 2px solid black;
            background-color: lightblue;
            text-align: center;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <header>
        <h1>99乘法表</h1>
    </header>
    <div class="container">
        <table>

        </table>

    </div>
    <script>
        // JavaScript code

        for (let i = 1; i < 10; i++) {
            // 1. 蓋樓層 (正確拼寫 document)
            let tr = document.createElement('tr');

            for (let j = 1; j < 10; j++) {
                // 2. 蓋房間 (變數名稱統一)
                let td = document.createElement('td');
                td.textContent = `${i} * ${j} = ${i * j}`;

                // 3. 把房間塞進樓層
                tr.append(td);
            }

            // 4. 把整層樓蓋到大樓裡 (正確拼寫 querySelector)
            document.querySelector('table').append(tr);
        }
    </script>
</body>

</html>
