<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module</title>
    <style>
        body {
            font-size: 17px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
        }

        header {
            background-color: black;
            color: yellow;
            /* 內距 */
            padding: 20px;
            /* 文字置中 */
            text-align: center;
        }

        .container {
            width: 90%;
            /* 外距 */
            margin: auto;
            padding: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Module</h1>
    </header>
    <div class="container"></div>
    <!-- ES6 模組化 <script type="module"> -->
    <script type="module">
        // javascript code
        // 對應的匯入
        // 命名匯入必須按照原始命名
        // import {a,add} from './c.js';
        // console.log(a);
        // let result = add(1,1);
        // console.log(result);

        // 對應的匯入
        // 可以不用按照原本的命名
        import ccc from './c.js';
        console.log(ccc('gary'));

    </script>
</body>

</html>
