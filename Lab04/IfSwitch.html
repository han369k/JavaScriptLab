<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IfSwitch</title>
    <style>
        body {
            font-size: 17px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
        }

        header {
            background-color: black;
            color: yellow;
            /* 內距 */
            padding: 20px;
            /* 文字置中 */
            text-align: center;
        }

        .container {
            width: 90%;
            /* 外距 */
            margin: auto;
            padding: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1>IfSwitch</h1>
    </header>
    <div class="container"></div>
    <script>
        // javascript code
        if (true) {
            // true時執行
        } else {
            // false時執行
        }
        // JavaScript可以省略{} 但不建議
        let a = 10;
        if (a > 9) console.log('大');

        // switch
        let num = 1;
        // num
        switch (num) {
            case 1:
                console.log('nem=1');
                break;
            case 2:
                console.log('num=2');
                break;
            default:
                console.log('num=x');
        }


    </script>
</body>

</html>
