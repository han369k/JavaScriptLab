<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForWhile</title>
    <style>
        body {
            font-size: 17px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff;
        }

        header {
            background-color: black;
            color: yellow;
            /* 內距 */
            padding: 20px;
            /* 文字置中 */
            text-align: center;
        }

        .container {
            width: 90%;
            /* 外距 */
            margin: auto;
            padding: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1>ForWhile</h1>
    </header>
    <div class="container"></div>
    <script>
        // javascript code
        // while loop
        // document.write('字串');  這比較少人在用 可以直接在頁面上顯示字串
        document.write(123 + "<br>" + 456);
        document.write('EEIT215');
        document.write('java');
        let n = 1;
        while (n < 10) {
            document.write(n++ + '<br>');
        }

        // 後制判斷(do while)
        let m = 10;
        do {
            // 任意程式至少會執行一次
            document.write('123' + '<br>');
            document.write(m++ + '<br>');
        } while (m < 10);

        /*
            While Lab
            投資年利率8% 1000成長到10000多少年
            第一年 1000
            第二年 1080
        */

        var target = 10000;
        var initialValue = 1000
        var counts = 0;
        while (initialValue <= target) {
            initialValue = initialValue * 1.08;
            counts++;
        }
        console.log(counts);

        // for loop
        // For initial counts variable always use "let" declaring
        for (let i = 0; i < 10; i++) {
            console.log(i);
        }

        // 1~100 奇數和
        var sum = 0;

        for (let j = 1; j <= 100; j++) {
            if (j % 2 != 0) {
                sum = sum + j
            }
        }
        console.log(sum);

        // 99乘法表
        /*
            *
            **
            ***
            ****
        */
        document.writeln('*' + '<br>');
        document.writeln('**' + '<br>');
        document.writeln('***' + '<br>');
        document.writeln('****' + '<br>');

        // 圖形高度
        for (let i = 1; i < 20; i++) {
            // 圖形寬度
            for (let j = 0; j < i; j++) {
                document.write('*');
            }
            document.write('<br>');
        }

        // for of (for each loop)
        let arr = ['資展', 'F202', "EEIT215"];
        for (let data of arr) {
            console.log(data);
        }
    </script>
</body>

</html>
